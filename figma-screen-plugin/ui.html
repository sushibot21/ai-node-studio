<style>
  :root { color-scheme: light dark; } body { margin: 0; padding: 18px; background: var(--figma-color-bg); color: var(--figma-color-text); font: 12px Inter, sans-serif; } h2 { margin: 0 0 6px; font-size: 16px; } p { color: var(--figma-color-text-secondary); line-height: 1.45; } textarea { box-sizing: border-box; width: 100%; height: 320px; resize: vertical; border: 1px solid var(--figma-color-border); border-radius: 7px; padding: 10px; background: var(--figma-color-bg-secondary); color: var(--figma-color-text); font: 11px ui-monospace, monospace; } footer { display: flex; gap: 8px; margin-top: 12px; } button { border: 0; border-radius: 6px; padding: 9px 12px; cursor: pointer; font-weight: 600; } #create { background: #ff8a4c; color: #21120a; } #cancel { background: var(--figma-color-bg-secondary); color: var(--figma-color-text); } #status { color: var(--figma-color-text-secondary); margin-left: auto; align-self: center; }
</style>
<h2>Screen Builder</h2><p>Paste a screen spec from Node Studio. This creates editable native Figma layers.</p>
<textarea id="spec">{
  "eyebrow": "SUNDARA SKINCARE",
  "title": "Science-led skincare for your city skin.",
  "subtitle": "High-performance daily rituals, designed for modern Indian life.",
  "background": "0B0B0B",
  "accent": "FF8A4C",
  "cards": [
    { "title": "Barrier first", "body": "Daily essentials that respect your skin's rhythm.", "cta": "Explore rituals" },
    { "title": "Made for movement", "body": "Thoughtful care for changing city days.", "cta": "Shop essentials" },
    { "title": "Simple, considered", "body": "A small routine with a meaningful result.", "cta": "Meet Sundara" }
  ],
  "improvements": [
    "Single clear primary CTA per view",
    "Added visible labels to all form inputs",
    "Raised text/background contrast to WCAG AA"
  ]
}</textarea>
<footer><button id="create">Create screen</button><button id="cancel">Cancel</button><span id="status"></span></footer>
<script>
  const status = document.getElementById('status');
  document.getElementById('create').onclick = () => { try { const spec = JSON.parse(document.getElementById('spec').value); status.textContent = 'Creating…'; parent.postMessage({ pluginMessage: { type: 'create-screen', spec } }, '*'); } catch { status.textContent = 'Invalid JSON'; } };
  document.getElementById('cancel').onclick = () => parent.postMessage({ pluginMessage: { type: 'close' } }, '*');
  onmessage = (event) => { const msg = event.data.pluginMessage; if (msg?.type === 'success') status.textContent = 'Created'; if (msg?.type === 'error') status.textContent = msg.message; };
</script>
